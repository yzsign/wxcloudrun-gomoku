server.port=80

spring.application.name=springboot-wxcloudrun
spring.datasource.url=jdbc:mysql://${MYSQL_HOST:127.0.0.1}:${MYSQL_PORT:3306}/${MYSQL_DATABASE:gomoku}?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=false
spring.datasource.username=${MYSQL_USERNAME:root}
spring.datasource.password=${MYSQL_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

mybatis.mapper-locations=classpath:mapper/**/*.xml
mybatis.configuration.map-underscore-to-camel-case=true

# 小程序 AppID / AppSecret（与微信公众平台一致；生产建议用环境变量注入）
wx.miniapp.app-id=${WX_MINIAPP_APP_ID:}
wx.miniapp.app-secret=${WX_MINIAPP_APP_SECRET:}

gomoku.board-size=15
# 随机匹配：双方均为真人且落子前，50% 交换先后手；关闭则始终先排队者为黑方
gomoku.match.random-swap-sides=true
# 多实例：轮询 room_game_state 间隔（毫秒）
gomoku.room-sync.poll-ms=150
# JWT 会话（生产务必通过环境变量设置长随机串）
gomoku.jwt.secret=${GOMOKU_JWT_SECRET:gomoku-dev-only-change-me-in-production}
# 管理端：X-Admin-Token（运维）和/或 微信 openid 白名单（小游戏 Bearer 会话）
gomoku.admin.token=${GOMOKU_ADMIN_TOKEN:}
# 多个 openid 用英文逗号分隔（须与 js/adminConfig.js 中 OPENID_ADMINS 一致）
gomoku.admin.openids=${GOMOKU_ADMIN_OPENIDS:}
